name: purgebot

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    container_name: purgebot-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5532}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: purgebot-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6479}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    container_name: purgebot-kafka
    image: apache/kafka:latest
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "${KAFKA_PORT:-9192}:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── Bot services ─────────────────────────────────────────────────────────────

  interactions:
    container_name: purgebot-interactions
    image: ${INTERACTIONS_IMAGE:-ghcr.io/purgebot-net/interactions:latest}
    pull_policy: if_not_present
    restart: unless-stopped
    env_file: .env
    ports:
      - "${INTERACTIONS_PORT:-8181}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    container_name: purgebot-gateway
    image: ${GATEWAY_IMAGE:-ghcr.io/purgebot-net/gateway:latest}
    pull_policy: if_not_present
    restart: unless-stopped
    env_file: .env
    environment:
      SHARD_SPLIT_COUNT: ${SHARD_SPLIT_COUNT:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  purger:
    container_name: purgebot-purger
    image: ${PURGER_IMAGE:-ghcr.io/purgebot-net/purger:latest}
    pull_policy: if_not_present
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
